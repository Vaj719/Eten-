<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>موقع سبام</title>
    <style>
        body { font-family: Arial; text-align: center; background: #f0f0f0; padding: 40px; }
        .container { background: #fff; padding: 20px; border-radius: 10px; display: inline-block; }
        input, select, button { margin: 10px; padding: 10px; width: 200px; }
        button { background: green; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>موقع سبام</h1>
        <input type="text" id="phone" placeholder="رقم الهاتف"><br>
        <input type="number" id="count" placeholder="عدد الإرسال"><br>
        <select id="type">
            <option value="ethir">سبام أثير</option>
            <option value="asia">سبام آسيا</option>
        </select><br>
        <button onclick="startSpam()">بدء الإرسال</button>
        <button onclick="stopSpam()">إيقاف الإرسال</button>
        <p id="status"></p>
    </div>

    <script>
        const apiUrl = "https://d834d8b1-1d8d-4905-8881-c00735775054-00-2jvq64f057t4i.pike.replit.dev/";  // غيّره إلى رابط السيرفر إن لزم

        async function startSpam() {
            const phone = document.getElementById('phone').value;
            const count = document.getElementById('count').value;
            const type = document.getElementById('type').value;

            document.getElementById('status').innerText = "جاري الإرسال...";

            const res = await fetch(`${apiUrl}/start_spam`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, count, type })
            });

            const data = await res.json();
            document.getElementById('status').innerText = data.message;
        }

        async function stopSpam() {
            const res = await fetch(`${apiUrl}/stop_spam`, { method: 'POST' });
            const data = await res.json();
            document.getElementById('status').innerText = data.message;
        }
    </script>
</body>
</html>
