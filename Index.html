<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eten VIP | رشق خدمات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --blue-primary: #00d2ff;
            --blue-hover: #0072ff;
            --glass-bg: rgba(15, 15, 20, 0.85);
            --glass-border: rgba(0, 210, 255, 0.2);
            --text-light: #ffffff;
            --text-muted: #8b95a5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #050505 0%, #0d0e15 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .vip-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(0, 210, 255, 0.05);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .vip-container::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: var(--blue-primary);
            filter: blur(100px);
            opacity: 0.2;
            z-index: -1;
        }

        .logo-area {
            margin-bottom: 30px;
        }

        .logo-area h1 {
            font-size: 38px;
            font-weight: 900;
            background: linear-gradient(to right, #0072ff, #00d2ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 4px;
            margin-bottom: 5px;
        }

        .logo-area p {
            color: var(--blue-primary);
            font-size: 14px;
            letter-spacing: 2px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .service-option input[type="radio"] {
            display: none;
        }

        .service-card {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .service-card i {
            font-size: 30px;
            margin-bottom: 10px;
            color: var(--text-muted);
            transition: all 0.3s ease;
        }

        .service-card span {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
        }

        .service-option input[type="radio"]:checked + .service-card {
            background: rgba(0, 210, 255, 0.08);
            border-color: var(--blue-primary);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.25);
            transform: translateY(-3px);
        }

        .service-option input[type="radio"]:checked + .service-card i,
        .service-option input[type="radio"]:checked + .service-card span {
            color: var(--blue-primary);
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        .input-group i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--blue-primary);
            font-size: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 45px 16px 15px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--blue-primary);
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, var(--blue-hover), var(--blue-primary));
            border: none;
            border-radius: 12px;
            color: #ffffff;
            font-size: 18px;
            font-weight: 900;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alert {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 700;
            display: none;
        }

        .alert.success {
            display: block;
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid #2ecc71;
            color: #2ecc71;
        }

        .alert.error {
            display: block;
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid #e74c3c;
            color: #e74c3c;
        }
    </style>
</head>
<body>

<div class="vip-container">
    <div class="logo-area">
        <h1>Eten01</h1>
        <p><i class="fa-solid fa-bolt"></i>خدمات رشق</p>
    </div>
    
    <div id="alertBox" class="alert"></div>

    <form id="rashaqForm">
        <div class="services-grid">
            <label class="service-option">
                <input type="radio" name="service" value="1" required>
                <div class="service-card">
                    <i class="fa-brands fa-youtube"></i>
                    <span>يوتيوب - تفاعل</span>
                </div>
            </label>

            <label class="service-option">
                <input type="radio" name="service" value="2">
                <div class="service-card">
                    <i class="fa-brands fa-tiktok"></i>
                    <span>تيك توك - إعجابات</span>
                </div>
            </label>

            <label class="service-option">
                <input type="radio" name="service" value="3">
                <div class="service-card">
                    <i class="fa-brands fa-instagram"></i>
                    <span>إنستغرام - حفظ</span>
                </div>
            </label>

            <label class="service-option">
                <input type="radio" name="service" value="4">
                <div class="service-card">
                    <i class="fa-solid fa-eye"></i>
                    <span>تيك توك - مشاهدات</span>
                </div>
            </label>
        </div>

        <div class="input-group">
            <i class="fa-solid fa-link"></i>
            <input type="url" id="target_url" placeholder="قم بلصق الرابط هنا..." required>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn"><i class="fa-solid fa-rocket"></i> إرسـال الرشـق</button>
    </form>
</div>

<script>
    document.getElementById('rashaqForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const alertBox = document.getElementById('alertBox');
        const submitBtn = document.getElementById('submitBtn');
        const serviceOptions = document.getElementsByName('service');
        const targetUrl = document.getElementById('target_url').value;
        
        let selectedService = null;
        for (let option of serviceOptions) {
            if (option.checked) {
                selectedService = option.value;
                break;
            }
        }

        const showAlert = (type, message) => {
            alertBox.className = `alert ${type}`;
            alertBox.innerHTML = message;
        };

        if (!selectedService) {
            showAlert('error', 'يرجى اختيار خدمة.');
            return;
        }

        const cooldownSeconds = 24 * 60 * 60;
        const storageKey = `cooldown_service_${selectedService}`;
        const lastUsed = localStorage.getItem(storageKey) || 0;
        const currentTime = Math.floor(Date.now() / 1000);
        const timePassed = currentTime - lastUsed;

        if (timePassed < cooldownSeconds) {
            const remainingSeconds = cooldownSeconds - timePassed;
            const hours = Math.floor(remainingSeconds / 3600);
            const minutes = Math.floor((remainingSeconds % 3600) / 60);
            showAlert('error', `لقد استخدمت هذه الخدمة. يرجى الانتظار ${hours} ساعة و ${minutes} دقيقة.`);
            return;
        }

        // التوكن الخاص بك
        const token = "FAKETOKEN"; 
        let apiUrl = "";
        let requestData = new URLSearchParams();
        
        requestData.append("token", token);
        requestData.append("timezone_offset", "Asia/Baghdad");
        requestData.append("free_link", targetUrl);

        switch (selectedService) {
            case "1":
                apiUrl = "https://leofame.com/free-youtube-likes?api=1";
                break;
            case "2":
                apiUrl = "https://leofame.com/free-tiktok-likes?api=1";
                break;
            case "3":
                apiUrl = "https://leofame.com/free-instagram-saves?api=1";
                requestData.append("quantity", "30");
                requestData.append("speed", "-1");
                break;
            case "4":
                apiUrl = "https://leofame.com/ar/free-tiktok-views?api=1";
                requestData.append("quantity", "200");
                break;
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري الإرسال...';

        try {
            // استخدام CORS Proxy لتخطي حظر المتصفح
            const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(apiUrl);
            
            const response = await fetch(proxyUrl, {
                method: 'POST',
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded",
                    // ملاحظة: المتصفحات تمنع إرسال Cookie عبر الجافاسكربت مباشرة
                },
                body: requestData.toString()
            });

            const responseText = await response.text();

            if (responseText.includes('Please wait') || responseText.includes('"error":')) {
                showAlert('error', "حدث خطأ من المصدر، تأكد من الرابط أو التوكن.");
            } else {
                showAlert('success', "تم إرسال الرشق بنجاح! جاري التنفيذ.");
                localStorage.setItem(storageKey, currentTime);
            }
        } catch (error) {
            console.error("Error:", error);
            showAlert('error', "حدث خطأ، الموقع المصدر قد يكون حظر البروكسي المجاني.");
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fa-solid fa-rocket"></i> إرسـال الرشـق';
        }
    });
</script>

</body>
</html>
